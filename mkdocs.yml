site_name: K5ANM — Amateur Radio
site_description: Personal amateur radio documentation for K5ANM covering TCARES, RACES, POTA, antennas, and field operations.
site_author: K5ANM
site_url: https://k5anm.net

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

nav:
  - Home: index.md
  - TCARES: tcares/index.md
  - RACES: races/index.md
  - POTA: pota/index.md
  - Antennas: antennas/index.md
  - Programming: programming/index.md
  - Equipment: equipment/index.md
  - Winlink: winlink/index.md
  - Field Day: field-day/index.md
  - Resources: resources/index.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true
